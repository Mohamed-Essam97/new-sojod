name: wird
description: "Wird - Complete Islamic lifestyle app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.2

  # Routing
  go_router: ^14.6.2

  # Audio
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  audio_service: ^0.18.15

  # Storage & persistence
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location & compass
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_compass: ^0.8.0

  # Quran (mandatory)
  quran_with_tafsir: ^1.0.1

  # Prayer times
  adhan: ^2.0.0

  # Hijri calendar
  hijri: ^3.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.2
  google_sign_in: ^6.2.2
  flutter_facebook_auth: ^6.0.4

  # UI & Utils
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/

  fonts:
    - family: QuranFont
      fonts:
        - asset: assets/fonts/KfgqpcHafsUthmanicScriptRegular-nARZ1.ttf
    - family: TafsirFont
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
